<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/trasportador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Transportadores - GeoAgro</title>
</head>
<body>
     <aside class="menu">
        <div class="perfil">
            <img src="imagem/perfil.png" alt="Foto de Perfil" class="foto-perfil">
            <h3 class="nome--agricultor">Rodrigo Muandumba</h3>
            <p>Produtor Rural</p>
        </div>
        <nav class="navegacao">
            <ul>
                <li><a href="home.html"><i class="fas fa-home"></i> Início</a></li>
                <li class="active"><a href="trasportador.html"><i class="fas fa-truck"></i> Transportadores</a></li>
                <li><a href="monitoramento.html"><i class="fas fa-seedling"></i> Monitoramento</a></li>
                <li><a href="telademensagem.html"><i class="fas fa-comment-dots"></i> Mensagens</a></li>
                <li><a href="marketplace.html"><i class="fas fa-shopping-cart"></i> Marketplace</a></li>
                <li ><a href="definicoes.html"><i class="fas fa-cog"></i> Definições</a></li>
            </ul>
        </nav>
    </aside>
    <main class="principal">
        <header class="cabe-transp">
            <div class="busca-transp">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Pesquisar transportador...">
            </div>
            <div class="user-actions">
                <button><i class="fas fa-bell"></i></button>
                <a href="perfil-usuario.html"><button><i class="fas fa-user"></i></button></a>
            </div>
        </header>

        <section class="conteudo">
            <div class="layout-mapa">
                <div class="mapa-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63051.0189025078!2d13.201659858203125!3d-8.833917400000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1a51f3c533209867%3A0x6b696a090e513d81!2sLuanda%2C%20Angola!5e0!3m2!1spt-PT!2sao!4v1710100000000!5m2!1spt-PT!2sao" 
                        width="100%" 
                        height="100%" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <div class="solicitacao-container">
                    <div class="card-solicitacao">
                        <h3>Solicitar Transporte</h3>
                        <div class="input-rota">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" placeholder="Local de partida">
                        </div>
                        <div class="input-rota">
                            <i class="fas fa-flag-checkered"></i>
                            <input type="text" placeholder="Destino">
                        </div>
                        <button class="btn-solicitar">Solicitar Agora</button>
                    </div>

                    <div class="lista-disponiveis">
                        <h4><i class="fas fa-list"></i> Disponíveis Agora</h4>
                        <div class="item-transportador">
                            <div class="avatar">TP</div>
                            <div class="info">
                                <strong>Transp. Ágil</strong>
                                <span>Caminhão • 5km de distância</span>
                            </div>
                            <div class="status-online"></div>
                        </div>
                        <div class="item-transportador">
                            <div class="avatar">LM</div>
                            <div class="info">
                                <strong>Logística Muanda</strong>
                                <span>Carga Pesada • 12km de distância</span>
                            </div>
                            <div class="status-online"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
